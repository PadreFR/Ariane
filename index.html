<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/ariane.css" />
<style>
  html, body, #root { height: 100%; }
  #root { overflow: hidden; }

  /* hover states */
  .doc-card:hover, .doc-result:hover, .view-card:hover, .sugg-card:hover {
    box-shadow: var(--sh-md); border-color: var(--border-strong); transform: translateY(-1px);
  }
  .doc-row:hover, .related-row:hover { background: var(--slate-2); }
  .nav-item:hover { background: var(--slate-3) !important; color: var(--text) !important; }
  .example-chip:hover { background: var(--slate-2) !important; border-color: var(--border-strong) !important; color: var(--text) !important; }
  .dropzone:hover { border-color: var(--slate-8); background: var(--slate-2); }
  .dz-hint { transition: background .14s, color .14s; }
  .dropzone:hover .dz-hint { background: var(--surface); }

  /* responsive */
  @media (max-width: 1000px) {
    .detail-grid { grid-template-columns: 1fr !important; }
    .detail-grid aside { position: static !important; }
  }
  @media (max-width: 880px) {
    .search-filters { display: none !important; }
    .screen-scroll [style*="grid-template-columns: 230px"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    .sidebar { display: none !important; }
    .row-tags { display: none !important; }
  }
  :root[data-density="compact"] .conf-lbl { display: none; }
</style>
</head>
